<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek-R1 Chat</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --thinking: #8b5cf6;
      --user-bubble: #1d4ed8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 24px; }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .badge {
      font-size: 11px; padding: 3px 8px; border-radius: 20px;
      background: #1e3a5f; color: #60a5fa; margin-left: auto;
    }
    header .status { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }

    /* ── Chat area ─────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* ── Messages ──────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.assistant {
      align-self: flex-start;
    }

    .msg .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--accent); }
    .msg.assistant .avatar { background: #4c1d95; }

    .msg .body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 18px;
      line-height: 1.65;
      font-size: 15px;
    }
    .msg.user .body { background: var(--user-bubble); border-color: var(--user-bubble); }

    .thinking-block {
      background: #1e1b4b;
      border: 1px solid #312e81;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #a78bfa;
      line-height: 1.55;
    }
    .thinking-block .label {
      font-weight: 700; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.08em; color: #8b5cf6; margin-bottom: 6px;
    }

    .msg .body p + p { margin-top: 8px; }
    .msg .body pre {
      background: #0f172a; border-radius: 8px; padding: 12px; margin: 8px 0;
      overflow-x: auto; font-size: 13px; border: 1px solid #334155;
    }
    .msg .body code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 13px; }
    .msg .body p code { background: #334155; padding: 1px 5px; border-radius: 3px; }

    /* ── Input ─────────────────────────────────── */
    footer {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 48px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: background 0.2s, opacity 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: var(--accent-hover); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Spinner ───────────────────────────────── */
    .typing-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: var(--muted); animation: blink 1.4s infinite both;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* ── Scrollbar ─────────────────────────────── */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty state ───────────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 22px; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; max-width: 420px; margin: 0 auto; }

    @media (max-width: 640px) {
      header { padding: 12px 16px; }
      header h1 { font-size: 16px; }
      #chat { padding: 16px; }
      .msg { max-width: 95%; }
      footer { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- HEADER                                                       -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <header>
    <div class="status" id="status-dot" title="Connected"></div>
    <span class="logo">🧠</span>
    <h1>DeepSeek-R1</h1>
    <span class="badge">mkq</span>
  </header>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- CHAT AREA                                                    -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <div id="chat">
    <div class="empty-state">
      <div class="icon">⚡</div>
      <h2>DeepSeek-R1 is ready</h2>
      <p>Ask anything — R1 reasons step-by-step before answering. Responses stream in real time.</p>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════════ -->
  <!-- INPUT                                                        -->
  <!-- ════════════════════════════════════════════════════════════ -->
  <footer>
    <div id="input-wrap">
      <textarea
        id="user-input"
        placeholder="Type your message…"
        rows="1"
        autofocus
      ></textarea>
      <button id="send-btn" title="Send (Enter)">▶</button>
    </div>
  </footer>

<!-- ══════════════════════════════════════════════════════════════ -->
<!-- STREAMING CLIENT (inlined for Cloudflare Pages zero-build)     -->
<!-- ══════════════════════════════════════════════════════════════ -->
<script type="module">
// ===========================================================================
// CONFIGURATION — Cloudflare Pages env vars injected at build time
// ===========================================================================
const API_BASE  = '{{API_BASE_URL}}'  || 'https://YOUR_ORACLE_VPS_IP';
const API_KEY   = '{{API_KEY}}'       || 'sk-mkq-YOUR_KEY_HERE';
const MODEL     = '{{MODEL}}'         || 'deepseek-r1-mkq';
const TEMP      = 0.7;
const MAX_TOKENS = 2048;

// ===========================================================================
// KEY VALIDATION
// ===========================================================================
const MKQ_KEY_RE = /^sk-mkq-[a-f0-9]{42}$/;
function validateKey(k) {
  if (!k || typeof k !== 'string') return { ok: false, why: 'API key missing' };
  if (!MKQ_KEY_RE.test(k)) return { ok: false, why: 'Key must match sk-mkq- + 42 hex chars' };
  return { ok: true };
}

// ===========================================================================
// SSE PARSER — handles chunked frames across reads
// ===========================================================================
function sseParser() {
  let buf = '';
  return new TransformStream({
    transform(chunk, ctrl) {
      buf += chunk;
      const parts = buf.split('\n\n');
      buf = parts.pop() || '';
      const evts = [];
      for (const p of parts) {
        if (!p.trim()) continue;
        let data = '';
        for (const line of p.split('\n')) {
          if (line.startsWith('data: ')) data += line.slice(6);
          else if (line.startsWith('data:')) data += line.slice(5);
        }
        if (data) evts.push(data.trim());
      }
      if (evts.length) ctrl.enqueue(evts);
    },
    flush(ctrl) {
      if (!buf.trim()) return;
      let data = '';
      for (const line of buf.split('\n')) {
        if (line.startsWith('data: ')) data += line.slice(6);
        else if (line.startsWith('data:')) data += line.slice(5);
      }
      if (data.trim()) ctrl.enqueue([data.trim()]);
    }
  });
}

// ===========================================================================
// STREAMING FETCH
// ===========================================================================
async function* streamChat(messages, signal) {
  const resp = await fetch(`${API_BASE}/v1/chat/completions`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${API_KEY}` },
    body: JSON.stringify({ model: MODEL, messages, temperature: TEMP, max_tokens: MAX_TOKENS, stream: true }),
    signal,
  });
  if (!resp.ok) {
    const t = await resp.text().catch(() => '');
    if (resp.status === 401 || resp.status === 403) throw new Error('Auth failed — check your API key');
    if (resp.status === 429) throw new Error('Rate limited — slow down');
    throw new Error(`Server error ${resp.status}: ${t.slice(0,200)}`);
  }
  if (!resp.body) throw new Error('No response body — streaming not supported');

  const reader = resp.body.pipeThrough(new TextDecoderStream()).pipeThrough(sseParser()).getReader();
  while (true) {
    const { value, done } = await reader.read();
    if (done) return;
    if (!value) continue;
    for (const evt of value) {
      if (evt === '[DONE]') return;
      try {
        const d = JSON.parse(evt);
        const delta = d.choices?.[0]?.delta;
        if (delta?.reasoning_content) yield { thinking: delta.reasoning_content };
        if (delta?.content) yield { text: delta.content };
      } catch (_) { /* skip malformed */ }
    }
  }
}

// ===========================================================================
// SIMPLE MARKDOWN → HTML (bold, code, paragraphs)
// ===========================================================================
function md2html(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

// ===========================================================================
// DOM
// ===========================================================================
const chat   = document.getElementById('chat');
const input  = document.getElementById('user-input');
const btn    = document.getElementById('send-btn');
const dot    = document.getElementById('status-dot');
let busy     = false;
let ctrl     = null;

function scroll() { chat.scrollTop = chat.scrollHeight; }

function createMsg(role) {
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = role === 'user'
    ? '<div class="avatar">👤</div><div class="body"></div>'
    : '<div class="avatar">🧠</div><div class="body"></div>';
  chat.appendChild(d);
  return d.querySelector('.body');
}

function clearEmpty() {
  const e = chat.querySelector('.empty-state');
  if (e) e.remove();
}

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;

  clearEmpty();
  busy = true;
  btn.disabled = true;
  dot.style.background = '#facc15'; // thinking

  // User message
  const ub = createMsg('user');
  ub.textContent = text;
  input.value = '';
  scroll();

  // Assistant message
  const ab = createMsg('assistant');

  // Thinking block
  const thinkDiv = document.createElement('div');
  thinkDiv.className = 'thinking-block';
  thinkDiv.innerHTML = '<div class="label">💭 Thinking…</div>';
  ab.appendChild(thinkDiv);

  // Content container
  const contentDiv = document.createElement('div');
  ab.appendChild(contentDiv);

  // Spinner
  const spinner = document.createElement('span');
  spinner.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  contentDiv.appendChild(spinner);

  scroll();

  // Stream
  let thinking = '', content = '';
  ctrl = new AbortController();

  try {
    for await (const chunk of streamChat([{ role: 'user', content: text }], ctrl.signal)) {
      if (chunk.thinking) {
        thinking += chunk.thinking;
        thinkDiv.innerHTML = `<div class="label">💭 Thinking…</div>${md2html(thinking)}`;
      }
      if (chunk.text) {
        // Remove spinner on first real token
        if (!content) spinner.remove();
        content += chunk.text;
        contentDiv.innerHTML = md2html(content);
      }
      scroll();
    }
    // Clean up thinking block if empty
    if (!thinking.trim()) thinkDiv.remove();
    else thinkDiv.querySelector('.label').textContent = '💭 Reasoning';
  } catch (err) {
    if (err.name === 'AbortError') {
      if (!content) contentDiv.textContent = '[cancelled]';
    } else {
      contentDiv.innerHTML = `<span style="color:var(--danger)">❌ ${err.message}</span>`;
    }
  } finally {
    busy = false;
    btn.disabled = false;
    ctrl = null;
    dot.style.background = '#22c55e'; // ready
    input.focus();
  }
}

// ===========================================================================
// EVENTS
// ===========================================================================
btn.addEventListener('click', send);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  if (e.key === 'Escape' && ctrl) { ctrl.abort(); }
});

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

// Startup check
(function init() {
  const v = validateKey(API_KEY);
  if (!v.ok) {
    dot.style.background = '#ef4444';
    dot.title = v.why;
    console.warn('[mkq]', v.why);
  }
})();
</script>

</body>
</html>
